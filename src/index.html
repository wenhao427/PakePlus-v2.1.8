<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 基础ICO（兼容旧浏览器） -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <!-- 多尺寸PNG（现代浏览器） -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <!-- iOS主屏图标 -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>大螃蟹-能干活的AI智能体！</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:20px}
.container{max-width:1200px;margin:0 auto;background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.header{display:flex;align-items:center;gap:20px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #eee}
.logo-box{width:60px;height:60px;border-radius:12px;background:#007bff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.banner{width:100%;margin-bottom:30px;border-radius:12px;overflow:hidden}
.banner img{width:100%;display:block}
.brand-info h1{font-size:24px;color:#2d3748}
.brand-info p{color:#718096;margin-top:4px}
.section{margin-bottom:40px}
.section-title{font-size:20px;font-weight:600;margin-bottom:16px;padding-left:10px;border-left:4px solid #007bff}
.btn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.work-btn{height:120px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.work-btn:hover{background:#e8f4f8;border-color:#007bff}
.btn-text{font-size:16px;color:#2d3748;margin-bottom:6px}
.btn-hint{font-size:12px;color:#999}
.empty-tip{text-align:center;color:#999;padding:20px;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-box" id="logoBox"></div>
    <div class="brand-info">
      <h1 id="brandTitle">大螃蟹-能干活的AI智能体！</h1>
      <p id="brandSubtitle"></p>
    </div>
  </div>
  <div class="banner" id="bannerBox"></div>
  <div id="sectionsContainer"></div>
</div>

<script>
// 页面加载时强制拉取最新配置
window.onload = async function() {
  await loadFrontendConfig();
};

// 加载前端配置（禁用缓存，确保同步最新）
async function loadFrontendConfig() {
  try {
    const res = await fetch("http://localhost:5000/api/config", {
      method: "GET",
      cache: "no-store" // 关键：禁用缓存
    });
    const data = await res.json();
    const config = data.data;
    
    // 渲染品牌信息
    document.getElementById("brandTitle").innerText = config.brand.name || "大螃蟹-能干活的AI智能体！";
    document.getElementById("brandSubtitle").innerText = config.brand.subtitle || "";
    
    // 渲染LOGO
    const logoBox = document.getElementById("logoBox");
    if (config.brand.logo_img) {
      logoBox.innerHTML = `<img src="${config.brand.logo_img}" style="width:100%;height:100%;object-fit:cover">`;
    } else {
      logoBox.innerHTML = `<span style="color:white;font-size:28px;font-weight:bold">AI</span>`;
    }
    
    // 渲染横幅
    const bannerBox = document.getElementById("bannerBox");
    if (config.brand.banner_img) {
      bannerBox.innerHTML = `<img src="${config.brand.banner_img}" alt="横幅">`;
    } else {
      bannerBox.style.display = "none"; // 无横幅时隐藏
    }
    
    // 渲染分区和按钮
    renderFrontendSections(config.sections, config.buttons);
  } catch (err) {
    alert("加载配置失败，请检查server.py是否运行！");
    console.error(err);
  }
}

// 渲染前端分区和按钮
function renderFrontendSections(sections, buttons) {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";
  
  if (!sections || sections.length === 0) {
    container.innerHTML = '<div class="empty-tip">暂无分区，请前往后台添加</div>';
    return;
  }
  
  // 按排序号排序分区
  sections.sort((a, b) => a.sort - b.sort).forEach(sec => {
    const sectionDiv = document.createElement("div");
    sectionDiv.className = "section";
    sectionDiv.innerHTML = `
      <div class="section-title">${sec.name}</div>
      <div class="btn-grid" id="btnGrid-${sec.id}"></div>
    `;
    container.appendChild(sectionDiv);
    
    // 筛选当前分区的按钮
    const sectionButtons = buttons.filter(btn => btn.sections && btn.sections.includes(sec.id));
    const btnGrid = document.getElementById(`btnGrid-${sec.id}`);
    
    if (sectionButtons.length === 0) {
      btnGrid.innerHTML = '<div class="empty-tip">暂无按钮，请前往后台添加</div>';
      return;
    }
    
    // 渲染按钮
    sectionButtons.forEach(btn => {
      const btnDiv = document.createElement("div");
      btnDiv.className = "work-btn";
      btnDiv.innerHTML = `
        <div class="btn-text">${btn.text || '未命名按钮'}</div>
        <div class="btn-hint">${btn.hint || '待上线'}</div>
      `;
      // 点击触发快捷键
      btnDiv.onclick = async function() {
        if (!btn.shortcut) {
          alert("该按钮暂无快捷键配置！");
          return;
        }
        try {
          const res = await fetch("http://localhost:5000/trigger", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ shortcut: btn.shortcut })
          });
          const data = await res.json();
          if (data.code !== 200) {
            alert("触发失败：" + data.msg);
          }
        } catch (err) {
          alert("触发失败：" + err.message);
        }
      };
      btnGrid.appendChild(btnDiv);
    });
  });
}
</script>
</body>
</html>
